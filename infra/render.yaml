services:
  - type: web
    name: conversorcambio-api
    runtime: node
    region: oregon
    plan: free
    buildCommand: cd backend && npm install && npm run build
    startCommand: cd backend && npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "4000"
      - key: ALLOWED_ORIGINS
        value: https://conversorcambio.com
      - key: REDIS_URL
        fromService:
          type: redis
          name: conversorcambio-redis
          property: connectionString

  - type: redis
    name: conversorcambio-redis
    plan: free
    region: oregon
    maxmemoryPolicy: allkeys-lru
    ipAllowList: []
